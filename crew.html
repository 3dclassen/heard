<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a10">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="HEARD">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./css/style.css">
  <title>HEARD — Crew</title>
</head>
<body>

  <div id="app-shell" class="visible">
    <div class="offline-banner" id="offline-banner"></div>

    <nav class="nav">
      <span class="nav-logo">HEAR<span>D</span></span>
      <div class="nav-links">
        <a href="./index.html"     class="nav-link">Artists</a>
        <a href="./timetable.html" class="nav-link">Timetable</a>
        <a href="./crew.html"      class="nav-link active">Crew</a>
        <a href="./admin.html"     class="nav-link" id="nav-admin" style="display:none">Admin</a>
      </div>
      <div class="nav-avatar" id="nav-avatar">
        <img id="nav-avatar-img" src="" alt="Avatar">
      </div>
    </nav>

    <main class="main">
      <h1 class="page-title">Crew</h1>

      <!-- Crew-Mitglieder -->
      <div id="crew-members" class="crew-grid"></div>

      <!-- Einladen / Verbinden -->
      <div class="invite-section">
        <div class="invite-section-title">Crew erweitern</div>

        <!-- Code generieren -->
        <p class="invite-hint">Generiere einen Code und schick ihn an dein Crew-Mitglied:</p>
        <button class="btn-primary" id="btn-generate-code">Code generieren</button>

        <div id="invite-code-box" style="display:none">
          <div class="invite-code-display">
            <span class="invite-code-text" id="invite-code-text">------</span>
            <button class="btn-copy" id="btn-copy-code">Kopieren</button>
          </div>
        </div>

        <div class="invite-divider">oder</div>

        <!-- Code eingeben -->
        <p class="invite-hint">Gib einen Code ein den du erhalten hast:</p>
        <div style="display:flex;gap:0.5rem">
          <input
            type="text"
            id="invite-input"
            class="text-input invite-code-input"
            placeholder="ABC123"
            maxlength="8"
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
          >
          <button class="btn-primary" id="btn-accept-code">Verbinden</button>
        </div>
        <p id="invite-feedback" style="font-size:0.8rem;margin-top:0.5rem;min-height:1.2em"></p>
      </div>

      <!-- Gemeinsame Favoriten -->
      <div id="shared-section" style="display:none">
        <h2 class="section-title">Alle wollen sehen 🔥</h2>
        <div id="shared-favorites" class="artist-list" style="margin-bottom:1.5rem"></div>
      </div>

      <!-- Artist-Liste mit Crew-Ratings -->
      <h2 class="section-title">Crew-Bewertungen</h2>
      <div id="crew-artist-list" class="artist-list">
        <div class="loader"><div class="spinner"></div> Lade...</div>
      </div>
    </main>

    <button id="btn-logout" style="display:none"></button>
  </div>

  <script type="module" src="./js/crew.js"></script>
</body>
</html>
