<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a10">
  <meta name="description" content="HEARD — Dein Festival-Companion für MODEM 2026">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="HEARD">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./css/style.css">
  <title>HEARD — Artists</title>
</head>
<body>

  <!-- ── Login Screen ── -->
  <div id="login-screen" style="display:flex">
    <div class="login-logo">HEAR<span>D</span></div>
    <p class="login-tagline">Hör rein, bewerte, plane deinen persönlichen Festival-Timetable.</p>
    <button id="btn-login" class="btn-google">
      <!-- Google Icon -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Mit Google anmelden
    </button>
  </div>

  <!-- ── App Shell ── -->
  <div id="app-shell">

    <!-- Offline-Banner -->
    <div class="offline-banner" id="offline-banner">
      Offline — Änderungen werden gespeichert und beim nächsten Mal synchronisiert
    </div>

    <!-- Navigation -->
    <nav class="nav">
      <span class="nav-logo">HEAR<span>D</span></span>
      <div class="nav-links">
        <a href="./index.html"     class="nav-link active">Artists</a>
        <a href="./timetable.html" class="nav-link">Timetable</a>
        <a href="./crew.html"      class="nav-link">Crew</a>
        <a href="./admin.html"     class="nav-link" id="nav-admin" style="display:none">Admin</a>
      </div>
      <div class="nav-avatar" id="nav-avatar" title="Abmelden">
        <img id="nav-avatar-img" src="" alt="Avatar">
      </div>
    </nav>

    <!-- Main -->
    <main class="main">

      <!-- Filter Bar -->
      <div class="filter-bar">
        <input
          type="search"
          id="search-input"
          class="search-input"
          placeholder="Artist suchen..."
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        >
        <div class="filter-pills">
          <button class="pill active" data-stage="all">Alle Stages</button>
          <button class="pill" data-stage="hive">The Hive</button>
          <button class="pill" data-stage="swamp">The Swamp</button>
          <button class="pill" data-stage="seed">The Seed</button>
        </div>
        <div class="filter-pills">
          <button class="pill active" data-status="all">Alle</button>
          <button class="pill" data-status="unrated">Noch nicht bewertet</button>
          <button class="pill" data-status="rated">Bewertet</button>
          <button class="pill" data-status="favorites">Favoriten ♥</button>
          <button class="pill" data-status="listened">Reingehört</button>
        </div>
      </div>

      <div class="artist-count" id="artist-count">
        <span id="artist-count-text"></span>
        <div class="sort-controls">
          <button class="sort-btn active" data-sort="name-asc" title="A → Z">A↑</button>
          <button class="sort-btn" data-sort="name-desc" title="Z → A">A↓</button>
          <button class="sort-btn" data-sort="rating-desc" title="Höchste Bewertung zuerst">★↓</button>
          <button class="sort-btn" data-sort="rating-asc" title="Niedrigste Bewertung zuerst">★↑</button>
        </div>
      </div>
      <div class="artist-list" id="artist-list">
        <div class="loader"><div class="spinner"></div> Lade Artists...</div>
      </div>
    </main>

    <!-- Abmelden-Button (versteckt, wird via nav-avatar getriggert) -->
    <button id="btn-logout" style="display:none"></button>

  </div>

  <!-- ── Detail Panel ── -->
  <div class="panel-backdrop" id="panel-backdrop"></div>
  <div class="panel" id="panel" role="dialog" aria-modal="true">
    <div class="panel-handle"></div>
    <div class="panel-content" id="panel-content"></div>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
